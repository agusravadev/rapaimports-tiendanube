<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

  }

  h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 36px; }
